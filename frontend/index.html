<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MoodSync – Discover music that matches your mood. Get personalized song recommendations based on how you feel." />
    <title>MoodSync — Mood-Based Music Recommendations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- ───────── Animated background blobs ───────── -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- ───────── Header ───────── -->
    <header id="app-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🎵</span>
                <h1>MoodSync</h1>
            </div>
            <p class="tagline">Music that matches your mood</p>
        </div>
    </header>

    <!-- ───────── Main layout ───────── -->
    <main id="app-main">
        <!-- ====== Controls panel ====== -->
        <section class="controls-panel glass-card" id="controls-panel">
            <div class="control-group">
                <label for="user-select">Who's listening?</label>
                <select id="user-select">
                    <option value="">Select user…</option>
                </select>
            </div>
            <div class="control-group">
                <label for="mood-select">How are you feeling?</label>
                <select id="mood-select" disabled>
                    <option value="">Pick a mood…</option>
                </select>
            </div>
            <button id="recommend-btn" class="btn-primary" disabled>
                <span class="btn-icon">✨</span> Get Recommendations
            </button>
        </section>

        <!-- ====== Songs grid ====== -->
        <section class="songs-section" id="songs-section">
            <h2 id="songs-heading" class="section-title">Select a mood to discover songs</h2>
            <div id="songs-grid" class="songs-grid"></div>
            <div id="songs-empty" class="empty-state hidden">
                <span class="empty-icon">🎶</span>
                <p>No songs found for this mood. Try another!</p>
            </div>
        </section>

        <!-- ====== Sidebar: Playlists + Activity ====== -->
        <aside class="sidebar" id="sidebar">
            <!-- Playlists -->
            <div class="sidebar-section glass-card">
                <h3 class="sidebar-title">🎧 My Playlists</h3>
                <div id="playlists-list" class="playlists-list">
                    <p class="placeholder-text">Select a user to see playlists</p>
                </div>
                <div class="create-playlist" id="create-playlist-section" style="display:none;">
                    <input type="text" id="new-playlist-name" placeholder="New playlist name…" />
                    <button id="create-playlist-btn" class="btn-small">+ Create</button>
                </div>
            </div>

            <!-- Playlist songs viewer -->
            <div class="sidebar-section glass-card hidden" id="playlist-songs-section">
                <h3 class="sidebar-title" id="playlist-songs-title">Playlist Songs</h3>
                <div id="playlist-songs-list" class="playlist-songs-list"></div>
            </div>

            <!-- Past Activity -->
            <div class="sidebar-section glass-card">
                <h3 class="sidebar-title">📊 Recent Activity</h3>
                <div id="activity-list" class="activity-list">
                    <p class="placeholder-text">Select a user to see activity</p>
                </div>
            </div>
        </aside>
    </main>

    <!-- ───────── Add-to-playlist modal ───────── -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal glass-card" id="playlist-modal">
            <h3>Add to Playlist</h3>
            <p id="modal-song-name"></p>
            <select id="modal-playlist-select">
                <option value="">Choose playlist…</option>
            </select>
            <div class="modal-actions">
                <button id="modal-add-btn" class="btn-primary btn-small">Add</button>
                <button id="modal-cancel-btn" class="btn-ghost btn-small">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ───────── Toast ───────── -->
    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
