# Render deployment configuration
# https://render.com/docs/blueprint-spec

databases:
  - name: moodsync-db
    plan: free
    databaseName: moodsync
    user: moodsync_user

services:
  - type: web
    name: moodsync
    plan: free
    runtime: python
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: moodsync-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.0"
